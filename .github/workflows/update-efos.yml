name: Update EFOS List

on:
  schedule:
    - cron: '0 14 * * *'   # 14:00 UTC = 08:00 CST / 09:00 CDT
  workflow_dispatch:
    inputs:
      force:
        description: 'Forzar actualizacion aunque no haya cambios'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.generate.outputs.changed }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # .NET ya viene preinstalado en ubuntu-latest - sin setup adicional
      - name: Generate EFOS JSON
        id: generate
        run: dotnet fsi scripts/generate_json.fsx
        env:
          FORCE: ${{ github.event.inputs.force }}

      - name: Commit y push si hay cambios
        if: steps.generate.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "data: actualizar listado EFOS $(date -u +%Y-%m-%d)"
          git push

      - name: Sin cambios
        if: steps.generate.outputs.changed == 'false'
        run: echo "El listado del SAT no tuvo cambios hoy."
